name: Deploy portfolio to AWS S3

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      S3_BUCKET: ${{ vars.S3_BUCKET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required vars
        run: |
          test -n "$AWS_REGION" || (echo "Missing repository variable AWS_REGION" && exit 1)
          test -n "$S3_BUCKET" || (echo "Missing repository variable S3_BUCKET" && exit 1)

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3 website bucket
        run: ./scripts/deploy-s3.sh "$S3_BUCKET" "$AWS_REGION"
